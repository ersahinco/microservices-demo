apiVersion: v1
kind: ConfigMap
metadata:
  name: image-updater
  namespace: boutique
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  # This ConfigMap is used to trigger ArgoCD syncs when images are updated
  # The image tags will be updated by the CI/CD pipeline
  adservice: "localhost:5000/online-boutique/adservice:dev"
  cartservice: "localhost:5000/online-boutique/cartservice:dev"
  checkoutservice: "localhost:5000/online-boutique/checkoutservice:dev"
  currencyservice: "localhost:5000/online-boutique/currencyservice:dev"
  emailservice: "localhost:5000/online-boutique/emailservice:dev"
  frontend: "localhost:5000/online-boutique/frontend:dev"
  paymentservice: "localhost:5000/online-boutique/paymentservice:dev"
  productcatalogservice: "localhost:5000/online-boutique/productcatalogservice:dev"
  recommendationservice: "localhost:5000/online-boutique/recommendationservice:dev"
  shippingservice: "localhost:5000/online-boutique/shippingservice:dev"
