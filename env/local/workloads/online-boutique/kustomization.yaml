apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: boutique
resources:
  - ../../../../kubernetes-manifests   # ← reuse upstream manifests
  - namespace.yaml
  - rollout-frontend.yaml
  - svc-frontend-stable.yaml
  - svc-frontend-canary.yaml
  - ingress-frontend.yaml
  - analysis-success-rate.yaml
patches:
  # delete upstream Deployment and Service named 'frontend'
  - target: { kind: Deployment, name: frontend }
    patch: |-
      $patch: delete
  - target: { kind: Service, name: frontend }
    patch: |-
      $patch: delete
