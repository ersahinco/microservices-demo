name: "GitOps CI/CD Pipeline"
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'env/local/**'
      - '.github/workflows/gitops-ci.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'env/local/**'
      - '.github/workflows/gitops-ci.yaml'

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      manifests: ${{ steps.changes.outputs.manifests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed services
        id: changes
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED_FILES"
          
          # Detect changed services
          SERVICES=""
          for service in adservice cartservice checkoutservice currencyservice emailservice frontend paymentservice productcatalogservice recommendationservice shippingservice; do
            if echo "$CHANGED_FILES" | grep -q "^src/$service/"; then
              SERVICES="$SERVICES $service"
            fi
          done
          
          # Detect manifest changes
          MANIFESTS_CHANGED="false"
          if echo "$CHANGED_FILES" | grep -q "^env/local/"; then
            MANIFESTS_CHANGED="true"
          fi
          
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "manifests=$MANIFESTS_CHANGED" >> $GITHUB_OUTPUT
          echo "Changed services: $SERVICES"
          echo "Manifests changed: $MANIFESTS_CHANGED"

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != ''
    strategy:
      matrix:
        service: ${{ fromJson(format('[{0}]', needs.detect-changes.outputs.services)) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push image
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE_NAME="${{ env.REGISTRY }}/online-boutique/$SERVICE:${{ env.IMAGE_TAG }}"
          
          echo "Building $SERVICE..."
          cd src/$SERVICE
          
          # Build the image
          docker build -t $IMAGE_NAME .
          
          # Push to local registry (simulated for demo)
          echo "Would push $IMAGE_NAME to ${{ env.REGISTRY }}"
          # In a real setup, you would:
          # docker push $IMAGE_NAME
          
          # For local development, we'll use a different approach
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
      
      - name: Update image tag in manifests
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE_NAME="${{ env.REGISTRY }}/online-boutique/$SERVICE:${{ env.IMAGE_TAG }}"
          
          # Update the image tag in the rollout manifest
          if [ -f "env/local/workloads/online-boutique/rollout-frontend.yaml" ] && [ "$SERVICE" = "frontend" ]; then
            sed -i "s|image: localhost:5000/online-boutique/frontend:dev|image: $IMAGE_NAME|g" env/local/workloads/online-boutique/rollout-frontend.yaml
          fi
          
          # Update other service images in kubernetes-manifests if needed
          # This is a simplified approach - in production you'd use more sophisticated tools
      
      - name: Commit updated manifests
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add env/local/workloads/online-boutique/rollout-frontend.yaml
          git commit -m "Update ${{ matrix.service }} image to ${{ env.IMAGE_TAG }}" || exit 0
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: always() && (needs.detect-changes.outputs.services != '' || needs.detect-changes.outputs.manifests == 'true')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64
      
      - name: Deploy to ArgoCD
        run: |
          # In a real setup, you would:
          # 1. Connect to your ArgoCD instance
          # 2. Sync the applications
          # 3. Monitor the deployment
          
          echo "Would sync ArgoCD applications:"
          echo "- online-boutique (for service changes)"
          echo "- All applications (for manifest changes)"
          
          # Simulate ArgoCD sync
          echo "ArgoCD sync completed successfully"

  notify:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push, deploy]
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ GitOps deployment completed successfully!"
            echo "Services updated: ${{ needs.detect-changes.outputs.services }}"
          else
            echo "❌ GitOps deployment failed!"
            exit 1
          fi
